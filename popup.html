<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="popup-logo">S</div>
      <h1 class="popup-title">SnapWord</h1>
    </div>
    <p class="popup-hint">Press <kbd>Ctrl+Shift+O</kbd> or right-click to start OCR</p>
    <div class="popup-buttons">
      <button id="btn-wordlist" class="popup-btn popup-btn-primary">Word List</button>
      <button id="btn-settings" class="popup-btn popup-btn-secondary">Settings</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
